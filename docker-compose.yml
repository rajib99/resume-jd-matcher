services:
  api:
    container_name: resume-jd-matcher
    # Local dev:  IMAGE_TAG=latest (default)
    # Production: DOCKER_IMAGE=user/resume-jd-matcher  IMAGE_TAG=sha-abc1234
    image: ${DOCKER_IMAGE:-resume-jd-matcher}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # Required — compose will refuse to start if this is unset or empty
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY must be set in the environment}
      # Optional overrides — sensible production defaults shown
      GROQ_MODEL:  ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LOG_LEVEL:     ${LOG_LEVEL:-INFO}
      ENVIRONMENT:   ${ENVIRONMENT:-production}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - web

networks:
  web:
    external: true
