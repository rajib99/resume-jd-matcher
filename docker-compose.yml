services:
  api:
    container_name: resume-jd-matcher
    # Local dev:  IMAGE_TAG=latest (default)
    # Production: DOCKER_IMAGE=user/resume-jd-matcher  IMAGE_TAG=sha-abc1234
    image: ${DOCKER_IMAGE:-resume-jd-matcher}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # Required — compose will refuse to start if this is unset or empty
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in the environment}
      # Optional overrides — sensible production defaults shown
      CLAUDE_MODEL:  ${CLAUDE_MODEL:-claude-sonnet-4-6}
      LOG_LEVEL:     ${LOG_LEVEL:-INFO}
      ENVIRONMENT:   ${ENVIRONMENT:-production}
    networks:
      - web
    # No ports exposed to the host — traffic arrives through the reverse proxy
    # on the shared "web" network (e.g. Traefik, Nginx).
    healthcheck:
      test: >
        CMD /venv/bin/python -c
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  web:
    external: true
