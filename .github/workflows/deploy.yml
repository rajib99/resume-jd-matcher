name: Deploy

on:
  push:
    branches: [main]

# Only one deploy runs at a time. If a new push to main arrives while a deploy
# is in flight the in-progress job is cancelled and the newer commit wins.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Full Docker Hub image path, e.g. acmecorp/resume-jd-matcher
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/resume-jd-matcher
  DEPLOY_DIR: /srv/apps/resume-jd-matcher

jobs:
  # ── Build & push to Docker Hub ───────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      # Short SHA used as the immutable image tag, e.g. "a1b2c3d"
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derives two tags automatically:
      #   latest       – always points to the most recent main build
      #   sha-<short>  – immutable, used for the actual VPS deployment
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.sha.outputs.short }}
          # Warm the layer cache from previous builds for faster CI
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push

    # Deployment secrets (VPS_HOST, VPS_USER, VPS_SSH_KEY) live in this
    # environment so they can be protected by approval rules and audit logs.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Fail immediately on any unhandled error; treat unset variables as errors.
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ env.DEPLOY_DIR }}"

            # Tell Compose which image to use for this deployment.
            export DOCKER_IMAGE="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="sha-${{ needs.build-push.outputs.short-sha }}"

            echo "▶ Pulling $DOCKER_IMAGE:$IMAGE_TAG"
            docker compose up -d --pull always --remove-orphans

            # ── Readiness gate: poll /health via docker exec ───────────────
            echo "▶ Waiting for app to be ready…"
            deadline=60
            elapsed=0
            while [ "$elapsed" -lt "$deadline" ]; do
              if docker exec resume-jd-matcher curl -sf http://127.0.0.1:8000/health; then
                echo "✓ App ready after ${elapsed}s"
                break
              fi
              if [ "$elapsed" -ge "$((deadline - 5))" ]; then
                echo "✗ App not ready within ${deadline}s — curl output above"
                echo "--- last 50 log lines ---"
                docker logs resume-jd-matcher --tail 50 || true
                exit 1
              fi
              echo "  [${elapsed}s/${deadline}s] not ready yet, retrying…"
              sleep 5
              elapsed=$((elapsed + 5))
            done

            echo "▶ Running containers:"
            docker compose ps

      # ── Job summary ────────────────────────────────────────────────────────
      # Runs even when previous steps fail so we always get a summary.
      - name: Write deployment summary
        if: always()
        env:
          SHORT_SHA: ${{ needs.build-push.outputs.short-sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deployment $( [ "$JOB_STATUS" = "success" ] && echo "✅ succeeded" || echo "❌ failed" )"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}\` |"
            echo "| **Commit** | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Workflow run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
