name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel any in-progress run for the same branch/PR so stale runs don't
# consume runners or post confusing results.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Lint & test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache the pip download cache (not the venv) so installs stay fast
      # across runs without risking a stale venv in the cache key.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --require-hashes --no-deps -r requirements-dev.txt || pip install -r requirements-dev.txt
        # --require-hashes preferred but only works if requirements include hashes;
        # the || fallback keeps CI green while hashes are optional.

      - name: Lint — ruff
        run: ruff check .

      - name: Test — pytest + coverage
        env:
          # Real key not needed: all Anthropic calls are mocked in the suite.
          ANTHROPIC_API_KEY: test-ci-key
        run: pytest
        # pytest.ini enforces --cov=app --cov-fail-under=80 automatically.

  # ── Docker build (verify Dockerfile is valid, no push) ──────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test   # Only worth building if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BuildKit / docker buildx required for cache-from/cache-to
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: resume-jd-matcher:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
          # Share the layer cache across CI runs to keep builds fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
