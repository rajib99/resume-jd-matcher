[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# E/W = pycodestyle errors/warnings, F = Pyflakes, I = isort, B = flake8-bugbear, UP = pyupgrade
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",   # line too long — enforced by the formatter, not the linter
    "B008",   # do not perform function call in default argument (FastAPI uses Depends() here)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]
