# Nginx server block for matcher.yourdomain.com
#
# Prerequisites:
#   1. Docker network "web" must exist:
#        docker network create web
#   2. Nginx container (or host Nginx) must be attached to the "web" network
#      so it can resolve the container name "resume-jd-matcher".
#   3. Obtain the initial SSL certificate before enabling the HTTPS block:
#        certbot certonly --webroot \
#          --webroot-path /var/www/certbot \
#          -d matcher.yourdomain.com \
#          --email you@yourdomain.com \
#          --agree-tos --no-eff-email
#      Then reload Nginx: nginx -s reload
#   4. Auto-renewal (add to cron or use certbot's systemd timer):
#        certbot renew --quiet && nginx -s reload

# ── HTTP — ACME challenge pass-through + redirect to HTTPS ──────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name matcher.yourdomain.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name matcher.yourdomain.com;

    # ── SSL — managed by Certbot ─────────────────────────────────────────────
    # Certbot will add/update these lines automatically:
    ssl_certificate     /etc/letsencrypt/live/matcher.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matcher.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Upstream resolution via Docker embedded DNS ───────────────────────────
    # The variable form forces Nginx to re-resolve at runtime instead of
    # failing to start when the container is not yet running.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream http://resume-jd-matcher:8000;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 10m;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/html
        text/plain
        text/xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # The frontend uses inline <script> and <style> blocks, so 'unsafe-inline'
    # is required. Replace with per-request nonces to harden further.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
        always;

    # ── Proxy to FastAPI container ────────────────────────────────────────────
    location / {
        proxy_pass $upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE / streaming responses (future-proofing)
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}
